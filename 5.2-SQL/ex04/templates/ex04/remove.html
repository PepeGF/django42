{% extends "ex04/base.html" %}
{% block title %}Movies Removal{% endblock %}

{% block style %}
    <style>
        form {
            margin: 20px;
        }
        label {
            margin-right: 10px;
        }
        select {
            margin-right: 10px;
        }
    </style>
{% endblock %}

{% block content %}
    <!-- Drop list to select the movie to remove -->
    <form method="post">
        {% csrf_token %}
        <label for="movie">Select a movie to remove:</label>
        <select name="movie" id="movie">
            {% for movie in movies %}
                <option value="{{ movie.0 }}">{{ movie.0 }}</option>
            {% endfor %}
        </select>
        <button type="submit">Remove</button>
    </form>

{% endblock %}
