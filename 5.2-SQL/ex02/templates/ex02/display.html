<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movies List</title>
    <style>
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 8px;
            text-align: left;
        }
        th {
            background-color: #f2f2f2;
        }
    </style>
</head>
<body>
    <table border="1">
        <thead>
            <tr>
                <th>Title</th>
                <th>Episode Number</th>
                <th>Opening Crawl</th>
                <th>Director</th>
                <th>Producer</th>
                <th>Release Date</th>
            </tr>
        </thead>
        <tbody>
            {% for movie in movies %}
            <tr>
                <td>{{ movie.0 | default:"" }}</td>
                <td>{{ movie.1 | default:"" }}</td>
                <td>{{ movie.2 | default:"" }}</td>
                <td>{{ movie.3 | default:"" }}</td>
                <td>{{ movie.4 | default:"" }}</td>
                <td>{{ movie.5 | default:"" }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</body>
</html>
