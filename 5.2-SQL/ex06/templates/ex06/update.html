{% extends "ex06/base.html" %}
{% block title %}Movies Update{% endblock %}

{% block style %}
    <style>
        form {
            margin: 20px;
        }
        label {
            margin-right: 10px;
        }
        select {
            margin-right: 10px;
        }
    </style>
{% endblock %}

{% block content %}
    <form method="post">
        {% csrf_token %}
        {{ form.movie.label_tag }} {{ form.movie }}
    <br/>
        {{ form.opening_crawl.label_tag }}<br/>
        {{ form.opening_crawl }}
    <br/>
    <button type="submit">Update</button>
  </form>
{% endblock %}
