<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario</title>
    <!-- import/use popup.js file -->
    <script src="../attached/ex02/popup.js"></script>
</head>
<body>
    <form action="/submit" method="post">
        <label for="firstname">Firstname:</label>
        <input type="text" id="firstname" name="firstname"><br>
        <label for="name">Name:</label>
        <input type="text" id="name" name="name"><br>
        <label for="age">Age:</label>
        <input type="number" id="age" name="age"><br>
        <label for="phone">Phone:</label>
        <input type="tel" id="phone" name="phone"><br>
        <label for="email">Email:</label>
        <input type="email" id="email" name="email"><br>
        <label for="student">Student at 42?</label>
        <input type="checkbox" id="student" name="student"><br>
        <label for="gender_male">Male</label>
        <input type="radio" id="gender_male" name="gender" value="Male">
        <label for="gender_female">Female</label>
        <input type="radio" id="gender_female" name="gender" value="Female">
        <label for="gender_other">Other</label>
        <input type="radio" id="gender_other" name="gender" value="Other"><br>
        <button type="button" onclick="displayFormContents()">Run that sexy Javascript!</button>

    </form>
</body>
</html>
