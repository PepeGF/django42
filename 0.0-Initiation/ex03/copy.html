<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ex03</title>
    <!-- Import CSS from ../attached/ex03/style.css -->
    <link rel="stylesheet" href="../attached/ex03/style.css">
</head>
<body>
    <li>
        <h2>Frontend</h2>

        <label>HTML5</label>
        <p data-value="80" style="--val:80%"><progress class="html5" value="80" max="100">80%</progress></p>

        <label>CSS3</label>
        <p data-value="60" style="--val:60%"><progress class="css3" value="60" max="100">60%</progress></p>

        <label>jQuery</label>
        <p data-value="50" style="--val:50%"><progress class="jquery" value="50" max="100">50%</progress></p>
    </li>

    <li>
        <h2>Backend</h2>

        <label>Python</label>
        <p data-value="75" style="--val:75%"><progress class="python" value="75" max="100">75%</progress></p>

        <label>PHP</label>
        <p data-value="65" style="--val:65%"><progress class="php" value="65" max="100">65%</progress></p>

        <label>Node.js</label>
        <p data-value="35" style="--val:35%"><progress class="node-js" value="35" max="100">35%</progress></p>
    </li>
</body>
</html>
