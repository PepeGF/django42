    <script>
(function () {
    const el = document.getElementById("nav-dynamic-text");
        let intervalId = null;

        async function refreshNavText() {
            const res = await fetch("{% url 'nav-text' %}", {
                headers: { "Accept": "application/json" }
            });
            const data = await res.json();

            el.textContent = data.random_name;

            if (data.authenticated && intervalId) {
                clearInterval(intervalId);
                intervalId = null;
            }
        }

        refreshNavText();

        intervalId = setInterval(refreshNavText, 42000);
        //intervalId = setInterval(refreshNavText, 1000);
    })();
</script>
