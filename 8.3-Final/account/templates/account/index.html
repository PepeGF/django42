{% load static %}
<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Account</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <style>
        body {
            min-height: 100vh;
            background: linear-gradient(140deg, #f8f4ef 0%, #d7ecf6 55%, #f4fbf7 100%);
        }

        .account-card {
            border: 0;
            border-radius: 1rem;
            box-shadow: 0 20px 45px rgba(17, 38, 68, 0.14);
        }
    </style>
</head>
<body class="d-flex align-items-center py-5">
    <main class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-sm-10 col-md-8 col-lg-6 col-xl-5">
                <section class="card account-card">
                    <div class="card-body p-4 p-md-5">
                        <p class="text-uppercase fw-semibold text-secondary mb-2">Django ex00</p>
                        <h1 class="h3 fw-bold mb-4">AJAX Login</h1>

                        <div id="errors" class="mb-3"></div>

                        <div
                            id="login-section"
                            {% if user.is_authenticated %}style="display: none;"{% endif %}
                        >
                            <form id="login-form">
                                {% csrf_token %}
                                <div class="mb-3">
                                    <label class="form-label" for="id_username">Username</label>
                                    <input class="form-control form-control-lg" id="id_username" name="username" type="text" required>
                                </div>
                                <div class="mb-4">
                                    <label class="form-label" for="id_password">Password</label>
                                    <input class="form-control form-control-lg" id="id_password" name="password" type="password" required>
                                </div>
                                <button class="btn btn-primary btn-lg w-100" type="submit">Login</button>
                            </form>
                        </div>

                        <div
                            id="logged-section"
                            {% if not user.is_authenticated %}style="display: none;"{% endif %}
                        >
                            <div class="alert alert-success mb-4" role="alert">
                                <strong id="logged-text">
                                    {% if user.is_authenticated %}
                                        Logged as {{ user.username }}
                                    {% endif %}
                                </strong>
                            </div>
                            <button id="logout-btn" class="btn btn-outline-danger btn-lg w-100" type="button">Logout</button>
                        </div>
                    </div>
                </section>
            </div>
        </div>
    </main>

    <script>
        window.ACCOUNT_URLS = {
            login: "{% url 'account:login' %}",
            logout: "{% url 'account:logout' %}"
        };
    </script>
    <script src="{% static 'account/js/account.js' %}"></script>
</body>
</html>
