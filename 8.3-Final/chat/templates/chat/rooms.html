<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Chat Rooms</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <main class="container py-5">
        <div class="row justify-content-center">
            <div class="col-12 col-md-10 col-lg-8">
                <div class="card shadow-sm border-0">
                    <div class="card-body p-4 p-md-5">
                        <div class="d-flex justify-content-between align-items-center mb-3">
                            <h1 class="h3 mb-0">Chat Rooms</h1>
                            <span class="badge text-bg-primary">{{ rooms|length }} rooms</span>
                        </div>
                        <p class="text-muted mb-4">Select one room to start chatting.</p>

                        <div class="list-group">
                            {% for room in rooms %}
                                <a href="{% url 'chat:room' room.name %}" class="list-group-item list-group-item-action d-flex justify-content-between align-items-center py-3">
                                    <span class="fw-semibold">{{ room.name }}</span>
                                    <span class="text-primary">Enter</span>
                                </a>
                            {% empty %}
                                <div class="alert alert-warning mb-0">No rooms available.</div>
                            {% endfor %}
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
