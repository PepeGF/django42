{% load static %}
<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Room {{ room.name }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>
<body class="bg-light">
    <main class="container py-4 py-md-5">
        <div class="row justify-content-center">
            <div class="col-12 col-lg-10">
                <div class="card shadow-sm border-0">
                    <div class="card-header bg-white d-flex justify-content-between align-items-center">
                        <h1 class="h4 mb-0">Room: {{ room.name }}</h1>
                        <a href="{% url 'chat:rooms' %}" class="btn btn-outline-secondary btn-sm">Back to rooms</a>
                    </div>

                    <div class="card-body">
                        <div id="messages-container" class="border rounded p-3 bg-body-tertiary overflow-auto" style="height: 420px;"></div>

                        <div class="input-group mt-3">
                            <input id="message-input" type="text" class="form-control" placeholder="Write a message" aria-label="Message input">
                            <button id="send-btn" type="button" class="btn btn-primary">Send</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        window.CHAT_CONFIG = {
            roomName: "{{ room.name }}",
            wsScheme: window.location.protocol === "https:" ? "wss" : "ws",
            currentUsername: "{{ request.user.username }}"
        };
    </script>
    <script src="{% static 'chat/js/chat.js' %}"></script>
</body>
</html>
