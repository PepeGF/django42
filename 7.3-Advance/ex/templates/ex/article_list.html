{% extends "base.html" %}

{% block title %}Articles List{% endblock %}

{% block content %}
<!-- Articles shown as a table -->
<table>
    <thead>
        <tr>
            <th>Title</th>
            <th>Author</th>
            <th>Created</th>
            <th>Synopsis</th>
        </tr>
    </thead>
    <tbody>
        {% for article in articles %}
        <tr>
            <td>{{ article.title }}</td>
            <td>{{ article.author }}</td>
            <td>{{ article.created }}</td>
            <td>{{ article.synopsis }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
